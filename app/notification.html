<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }
    .card {
      background: linear-gradient(135deg, rgba(20,20,40,0.97), rgba(30,10,10,0.97));
      border: 1px solid rgba(255,60,60,0.4);
      border-radius: 14px;
      padding: 18px 20px 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7);
      animation: slideIn 0.3s ease;
      position: relative;
    }
    @keyframes slideIn {
      from { transform: translateX(120%); opacity:0; }
      to   { transform: translateX(0);    opacity:1; }
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .icon { font-size: 1.6em; }
    .title {
      font-size: 1em;
      font-weight: 700;
      color: #ff4444;
      letter-spacing: 0.02em;
    }
    .body {
      font-size: 0.82em;
      color: #ccc;
      margin-bottom: 12px;
      line-height: 1.45;
      word-break: break-all;
    }
    .reason {
      display: inline-block;
      background: rgba(255,60,60,0.15);
      border: 1px solid rgba(255,60,60,0.3);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.78em;
      color: #ff7070;
      margin-bottom: 8px;
    }
    .close-btn {
      position: absolute;
      top: 10px; right: 12px;
      background: none; border: none;
      color: #666; font-size: 1.1em;
      cursor: pointer; line-height: 1;
    }
    .close-btn:hover { color: #fff; }
    .progress {
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #ff4444, #ff8800);
      width: 100%;
      transition: width 1s linear;
    }
  </style>
</head>
<body>
  <div class="card">
    <button class="close-btn" id="closeBtn">✕</button>
    <div class="header">
      <span class="icon">🚫</span>
      <span class="title" data-i18n="nt_title">TARTALOM BLOKKOLVA</span>
    </div>
    <div class="body">
      <span data-i18n="nt_body">A böngésző tiltott tartalmat jelenített meg.</span><br>
      <strong id="matchedKw" class="reason">–</strong>
    </div>
    <div class="progress"><div class="progress-bar" id="bar"></div></div>
  </div>

  <script src="i18n.js"></script>
  <script>
    (async () => {
      try { const cfg = await window.api.getConfig(); window.setLang(cfg.lang); window.applyI18n(); } catch(e) {}
    })();

    const bar = document.getElementById('bar');
    let timer = 9;
    let tick = null;

    function startCountdown() {
      if (tick) clearInterval(tick);
      timer = 9;
      bar.style.width = '100%';
      tick = setInterval(() => {
        timer--;
        bar.style.width = (timer / 9 * 100) + '%';
        if (timer <= 0) { clearInterval(tick); tick = null; window.api.closeNotification(); }
      }, 1000);
    }

    startCountdown();

    document.getElementById('closeBtn').addEventListener('click', () => {
      if (tick) clearInterval(tick);
      window.api.closeNotification();
    });

    window.api.onNotification(({ title, keyword }) => {
      document.getElementById('matchedKw').textContent = window.t('nt_reason') + keyword;
      startCountdown(); // Reset timer on new notification
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>ContentBlocker</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f0f1a,#1a0f0f);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
    h1{font-size:2em;color:#00d4ff;text-shadow:0 0 18px rgba(0,212,255,0.5);margin-bottom:6px}
    .sub{color:#666;font-size:.85em;margin-bottom:24px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:560px;margin-bottom:20px}
    .card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px 18px}
    .card-label{font-size:.75em;color:#888;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
    .card-value{font-size:1.25em;font-weight:700;color:#00d4ff}
    .card-value.green{color:#00ff88}
    .card-value.red{color:#ff4444}
    .card-value.orange{color:#ff8800}
    .badge-active{display:inline-flex;align-items:center;gap:6px}
    .dot{width:10px;height:10px;border-radius:50%;background:#00ff88;box-shadow:0 0 8px #00ff88;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .actions{display:flex;gap:10px;margin-top:4px}
    .btn{padding:12px 22px;border:none;border-radius:9px;font-size:.95em;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(0,0,0,.4)}
    .btn-primary{background:linear-gradient(135deg,#00d4ff,#0077aa);color:#fff}
    .btn-secondary{background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.15);color:#ddd}
    .footer{color:#333;font-size:.78em;margin-top:22px;text-align:center}
  </style>
</head>
<body>
  <h1>🛡 ContentBlocker</h1>
  <p class="sub" data-i18n="idx_sub">Aktívan védi a böngészőt a nem kívánt tartalmaktól</p>

  <div class="grid">
    <div class="card">
      <div class="card-label" data-i18n="lbl_status">Állapot</div>
      <div class="card-value green badge-active"><span class="dot"></span><span data-i18n="val_active">Aktív</span></div>
    </div>
    <div class="card">
      <div class="card-label" data-i18n="lbl_blocked">Blokkolt oldalak</div>
      <div class="card-value" id="blockedCount">–</div>
    </div>
    <div class="card">
      <div class="card-label" data-i18n="lbl_pw">Jelszóvédelem</div>
      <div class="card-value" id="pwStatus">–</div>
    </div>
    <div class="card">
      <div class="card-label" data-i18n="lbl_screentime">Képernyőidő</div>
      <div class="card-value" id="screenTime">–</div>
    </div>
    <div class="card">
      <div class="card-label" data-i18n="lbl_autostart">Automatikus indítás</div>
      <div class="card-value" id="autoStart">–</div>
    </div>
    <div class="card">
      <div class="card-label" data-i18n="lbl_custom">Egyéni szűrők</div>
      <div class="card-value" id="customCount">–</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="settingsBtn" data-i18n="btn_settings">⚙ Beállítások</button>
    <button class="btn btn-secondary" id="screenTimeBtn" data-i18n="btn_screentime">⏱ Képernyőidő</button>
  </div>

  <div class="footer">ContentBlocker v<span id="appVersion">…</span> · <span data-i18n="footer_text">Minden szűrés helyi · Nincs adatküldés</span></div>

  <script src="i18n.js"></script>
  <script>
    async function load() {
      const cfg = await window.api.getConfig();
      window.setLang(cfg.lang); window.applyI18n();
      const ver = await window.api.getVersion();
      document.getElementById('appVersion').textContent = ver;
      document.getElementById('blockedCount').textContent = cfg.blocked_count || 0;
      const pw = document.getElementById('pwStatus');
      pw.textContent = cfg.password_protected ? window.t('val_pw_set') : window.t('val_pw_none');
      pw.className = 'card-value ' + (cfg.password_protected ? 'green' : 'red');
      const rem = cfg.screen_time_remaining;
      const st = document.getElementById('screenTime');
      if (cfg.screen_time_limit <= 0) { st.textContent = window.t('val_unlimited'); st.className='card-value green'; }
      else if (rem === 0) { st.textContent = window.t('val_expired'); st.className='card-value red'; }
      else {
        const h=Math.floor(rem/3600),m=Math.floor((rem%3600)/60);
        st.textContent = h>0 ? `${h}ó ${m}p` : `${m}p`;
        st.className = rem < 300 ? 'card-value orange' : 'card-value green';
      }
      const as = document.getElementById('autoStart');
      as.textContent = cfg.auto_start ? window.t('val_on') : window.t('val_off');
      as.className = 'card-value ' + (cfg.auto_start ? 'green' : 'red');
      document.getElementById('customCount').textContent = (cfg.custom_blocked_sites||[]).length + ' ' + window.t('unit_items');
    }
    document.getElementById('settingsBtn').addEventListener('click', () => window.api.openSettings());
    document.getElementById('screenTimeBtn').addEventListener('click', () => window.api.openScreenTime());
    window.api.onConfigChanged(() => load());
    load();
    setInterval(load, 10000);
  </script>
</body>
</html>

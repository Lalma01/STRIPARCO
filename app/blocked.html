<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title id="pgTitle">Tartalom Blokkolva</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #110000 0%, #2a0808 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      overflow: hidden;
    }
    .icon {
      font-size: 5em;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
      text-shadow: 0 0 30px rgba(255, 68, 68, 0.8);
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    h1 {
      font-size: 3em;
      color: #ff4444;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    p {
      font-size: 1.2em;
      color: #ccc;
      max-width: 600px;
      line-height: 1.5;
      margin-bottom: 30px;
    }
    .shield {
      background: rgba(255, 68, 68, 0.1);
      border: 2px solid rgba(255, 68, 68, 0.3);
      padding: 20px 40px;
      border-radius: 12px;
      font-size: 1.1em;
      color: #ff8888;
    }
  </style>
</head>
<body>
  <div class="icon">🚫</div>
  <h1 id="h1">Tartalom Blokkolva</h1>
  <p id="p">A kért weboldal sérti a ContentBlocker biztonsági házirendjét (NSFW tartalom), ezért a hozzáférést letiltottuk.</p>
  <div class="shield" id="shield">ContentBlocker Aktív Védelem</div>
  <script>
    if (!(navigator.language || '').toLowerCase().startsWith('hu')) {
      document.documentElement.lang = 'en';
      document.getElementById('pgTitle').textContent = 'Content Blocked';
      document.getElementById('h1').textContent = 'Content Blocked';
      document.getElementById('p').textContent = 'The requested website violates the ContentBlocker security policy (NSFW content), so access has been blocked.';
      document.getElementById('shield').textContent = 'ContentBlocker Active Protection';
    }
  </script>
</body>
</html>

plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.striparco.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.striparco.app"
        minSdk 24
        targetSdk 34
        versionCode 11211
        versionName "1.12.11"
        resourceConfigurations += ["en", "hu"]
    }

    def storeFileProp = project.findProperty('STRIPARCO_STORE_FILE')

    signingConfigs {
        release {
            if (storeFileProp) {
                storeFile rootProject.file(storeFileProp)
                storePassword project.findProperty('STRIPARCO_STORE_PASSWORD')
                keyAlias project.findProperty('STRIPARCO_KEY_ALIAS')
                keyPassword project.findProperty('STRIPARCO_KEY_PASSWORD')
            }
        }
    }

    buildTypes {
        release {
            // Keep it lightweight; shrink resources & code to minimise install size.
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            // Sign with the release key when configured, otherwise produce an unsigned APK.
            signingConfig storeFileProp ? signingConfigs.release : null
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
    buildFeatures {
        viewBinding false
        buildConfig true
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.lifecycle:lifecycle-service:2.8.4'
}
